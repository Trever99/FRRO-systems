<!DOCTYPE html>
<html>
<head>
    <title>FRO Reminder System</title>
    <style>
        body {
            font-family: Arial;
            background-color: #f4f6f8;
            text-align: center;
        }

        .container {
            margin-top: 50px;
        }

        h1 {
            color: #2c3e50;
        }

        p {
            color: #555;
        }

        .search-box {
            margin: 30px 0;
        }

        input[type="text"] {
            padding: 10px;
            width: 300px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        button {
            padding: 10px 16px;
            margin-left: 10px;
            border: none;
            border-radius: 5px;
            background-color: #3498db;
            color: #fff;
            cursor: pointer;
        }

        button:hover {
            background-color: #2980b9;
        }

        .search-result {
            margin: 10px auto;
            padding: 10px;
            width: 340px;
            border: 1px solid #ddd;
            border-radius: 5px;
            background-color: #fff;
            color: #333;
        }

        .tabs {
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        .tab {
            background-color: #3498db;
            color: white;
            padding: 15px 25px;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
        }

        .tab:hover {
            background-color: #2980b9;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Welcome to CGC FRO Reminder System</h1>
    <p>An application to send reminders for FRO (Visa expiration) deadlines and updates.</p>


    <!-- Search window -->
    <div class="search-box">
        <form action="/search" method="get" id="searchForm">
            <input id="searchInput" type="text" name="q" placeholder="Search or view student..." value="{{ search_query | default('') }}" required>
            <button type="submit">Search</button>
            <button type="button" onclick="clearSearch()">Clear</button>
        </form>
    </div>

    <script>
        function clearSearch() {
            document.getElementById('searchInput').value = '';
            window.location.href = '/';
        }
    </script>

    {% if message %}
    <div class="search-result">
        <p>{{ message }}</p>
    </div>
    {% endif %}

    <!-- Tabs -->
    <div class="tabs">
       <!-- <div class="tab">Add Student FRO Details</div> -->
        <div class="tab" onclick="window.location.href='/add'">
        Add Student FRO Details
        </div>
        <div class="tab">Edit or Update Student Details</div>
        <div class="tab">Delete Student Details</div>
        <div class="tab">View Student Details</div>
    </div>

</div>

</body>
</html>
