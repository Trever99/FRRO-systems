<!doctype html>
<html>
  <head>
    <title>Add Student</title>
    <style>
      body {
        font-family: Arial;
        background: #f4f6f8;
      }

      .form-container {
        width: 500px;
        margin: 30px auto;
        background: white;
        padding: 20px;
        border-radius: 10px;
      }

      h2 {
        text-align: center;
      }

      input,
      select {
        width: 100%;
        padding: 8px;
        margin: 8px 0;
      }

      button {
        background: #3498db;
        color: white;
        padding: 10px;
        border: none;
        width: 100%;
        border-radius: 5px;
      }

      button:hover {
        background: #2980b9;
      }

      /* ─── Glassmorphism Alert Styling ──────────────────────────────── */

.alert-container {
    position: fixed;
    top: 16px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 1000;
    width: 90%;
    max-width: 620px;
    pointer-events: none;
}

/* Base Alert */
.alert {
    position: relative;
    padding: 16px 20px 16px 24px;
    margin-bottom: 12px;
    border-radius: 14px;

    backdrop-filter: blur(14px) saturate(180%);
    -webkit-backdrop-filter: blur(14px) saturate(180%);

    background: rgba(255, 255, 255, 0.18);
    border: 1px solid rgba(255, 255, 255, 0.25);

    box-shadow: 
        0 10px 35px rgba(0, 0, 0, 0.18),
        0 6px 18px rgba(0, 0, 0, 0.10);

    color: #ffffff;
    font-weight: 500;
    font-size: 15px;
    line-height: 1.45;

    pointer-events: auto;
    transition: all 0.25s ease;
    overflow: hidden;
}

/* Glass shine overlay */
.alert::before {
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(
        120deg,
        rgba(255,255,255,0.35) 0%,
        rgba(255,255,255,0.08) 40%,
        transparent 70%
    );
    pointer-events: none;
}

/* Success variant */
.alert.success {
    background: linear-gradient(
        135deg,
        rgba(46, 204, 113, 0.75) 0%,
        rgba(39, 174, 96, 0.68) 100%
    );
    border-color: rgba(46, 204, 113, 0.4);
}

/* Error variant */
.alert.error {
    background: linear-gradient(
        135deg,
        rgba(231, 76, 60, 0.82) 0%,
        rgba(192, 57, 43, 0.75) 100%
    );
    border-color: rgba(231, 76, 60, 0.38);
}

/* Close button */
.alert-close {
    position: absolute;
    top: 50%;
    right: 16px;
    transform: translateY(-50%);

    background: rgba(255,255,255,0.15);
    border: none;
    border-radius: 50%;

    width: 28px;
    height: 28px;

    color: #fff;
    font-size: 16px;
    font-weight: bold;

    cursor: pointer;

    display: flex;
    align-items: center;
    justify-content: center;

    backdrop-filter: blur(6px);
    transition: all 0.2s ease;
}

/* Close button hover */
.alert-close:hover {
    background: rgba(255,255,255,0.3);
    transform: translateY(-50%) scale(1.1);
}

/* Hover lift effect */
.alert:hover {
    transform: translateY(-2px);
    box-shadow: 
        0 16px 45px rgba(0, 0, 0, 0.25),
        0 8px 25px rgba(0, 0, 0, 0.15);
}

/* Entry animation */
@keyframes slideDown {
    from {
        opacity: 0;
        transform: translateY(-20px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

.alert {
    animation: slideDown 0.4s ease;
}
      /* ───────────────────────────────────────────────────── */
    </style>
  </head>
  <body>
    <div class="alert-container">
      {% with messages = get_flashed_messages(with_categories=true) %} {% if
      messages %} {% for category, message in messages %}
      <div class="alert {{ category }}" role="alert">
        <span>{{ message }}</span>
        <button type="button" class="alert-close" aria-label="Close">×</button>
      </div>
      {% endfor %} {% endif %} {% endwith %}
    </div>

    <div class="form-container">
      <h2>Add Student Details</h2>
      <!-- Removed: <p>{{ message }}</p> -->

      <form action="/submit" method="POST" enctype="multipart/form-data">
        <input type="text" name="name" placeholder="Name" required />
        <input type="email" name="email" placeholder="Email" />
        <input type="text" name="phone" placeholder="Phone Number" />

        <label>FRO Issue Date</label>
        <input type="date" name="fro_issue" />

        <label>FRO Expiry Date</label>
        <input type="date" name="fro_expiry" />

        <label>Passport Issue Date</label>
        <input type="date" name="passport_issue" />

        <label>Passport Expiry Date</label>
        <input type="date" name="passport_expiry" />

        <label>Visa Issue Date</label>
        <input type="date" name="visa_issue" />

        <label>Visa Expiry Date</label>
        <input type="date" name="visa_expiry" />

        <input type="text" name="roll" placeholder="Roll Number" />
        <input type="text" name="course" placeholder="Course" />
        <input type="text" name="country" placeholder="Country" />

        <label>Upload Document</label>
        <input type="file" name="document" />

        <button type="submit">Submit</button><br />
        <br /><button type="button" onclick="window.location.href = '/index'">
          back</button
        ><br />
      </form>
    </div>

    <script>
document.addEventListener('click', function(e) {
    if (e.target.classList.contains('alert-close')) {
        const alert = e.target.closest('.alert');
        if (alert) {
            alert.style.opacity = '0';
            alert.style.transform = 'translateY(-10px)';
            setTimeout(() => {
                alert.remove();
            }, 300);
        }
    }
});
</script>
  </body>
</html>
