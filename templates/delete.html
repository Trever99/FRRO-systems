<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<div class="container mt-4">
<h2>Delete Students</h2>

<table class="table table-bordered">
<tr>
<th>Roll</th>
<th>Name</th>
<th>Email</th>
<th>Phone Number</th>
<th>Course</th>
<th>Country</th>
<th>Actions</th>
</tr>

{% for s in students %}
<tr>
<td>{{ s.roll_no }}</td> 
<td>{{ s.name }}</td>
<td>{{ s.email }}</td>
<td>{{ s.phone_nr }}</td>
<td>{{ s.course_name }}</td>
<td>{{ s.country_name }}</td>

<td>
<form method="POST" action="/delete/{{ s.roll_no }}" onsubmit="return confirm('Are you sure you want to delete this student?')">
<button type="submit" class="btn btn-danger btn-sm">Delete</button>
</form>
</td>

</tr>
{% endfor %}
</table>
<br>
<button onclick="location.href='/'" class="btn btn-primary">Back to Home</button>
</div>
